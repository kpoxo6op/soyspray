---
- name: Alertmanager Telegram Secret
  ansible.builtin.include_role:
    name: app-secret
    apply:
      tags: [prometheus]
  vars:
    secret_name: alertmanager-telegram-secret
    secret_namespace: monitoring
    create_namespace: true
    secret_data:
      - { env_var: 'PROMETHEUS_TELEGRAM_BOT_TOKEN', key: 'PROMETHEUS_TELEGRAM_BOT_TOKEN' }
  tags: prometheus

- name: Apply Prometheus CRDs
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_path }}"
    namespace: argocd
    definition: "{{ lookup('file', playbook_dir + '/argocd/applications/observability/prometheus/prometheus-crds-application.yaml') }}"
  tags: [prometheus, prometheus-crds]

- name: Expand existing Prometheus metrics volume
  kubernetes.core.k8s:
    state: patched
    kubeconfig: "{{ kubeconfig_path }}"
    namespace: monitoring
    kind: PersistentVolumeClaim
    name: prometheus-kube-prometheus-stack-prometheus-db-prometheus-kube-prometheus-stack-prometheus-0
    definition:
      spec:
        resources:
          requests:
            storage: 20Gi
  tags: prometheus

- name: Apply Prometheus
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig_path }}"
    namespace: argocd
    definition: "{{ lookup('file', playbook_dir + '/argocd/applications/observability/prometheus/prometheus-application.yaml') }}"
  tags: prometheus
