---
- name: Find live Argo applications before parking the lab
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    namespace: argocd
    kubeconfig: "{{ kubeconfig_path }}"
  register: kong_bank_lab_live_applications

- name: Quiesce Kong bank-lab applications before removal
  kubernetes.core.k8s:
    state: patched
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ kong_bank_lab_application_name }}"
    namespace: argocd
    kubeconfig: "{{ kubeconfig_path }}"
    definition:
      operation: null
      spec:
        syncPolicy:
          automated: null
  loop: "{{ kong_bank_lab_runtime_application_manifests }}"
  loop_control:
    loop_var: application_manifest
    label: "{{ application_manifest }}"
  vars:
    kong_bank_lab_application_name: >-
      {{ application_manifest | regex_replace('-application[.]yaml$', '') }}
  when: >-
    kong_bank_lab_application_name in
    (kong_bank_lab_live_applications.resources | map(attribute='metadata.name') | list)

- name: Remove Kong bank-lab runtime applications
  kubernetes.core.k8s:
    state: absent
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ application_manifest | regex_replace('-application[.]yaml$', '') }}"
    namespace: argocd
    wait: true
    wait_timeout: 300
    kubeconfig: "{{ kubeconfig_path }}"
  loop: "{{ kong_bank_lab_runtime_application_manifests | reverse | list }}"
  loop_control:
    loop_var: application_manifest
    label: "{{ application_manifest }}"
