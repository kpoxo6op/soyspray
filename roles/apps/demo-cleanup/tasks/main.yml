---
- name: Find retired demo applications
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    namespace: argocd
    kubeconfig: "{{ kubeconfig_path }}"
  register: retired_demo_live_applications
  tags: demo_cleanup

- name: Quiesce retired demo applications
  kubernetes.core.k8s:
    state: patched
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ retired_demo_application }}"
    namespace: argocd
    kubeconfig: "{{ kubeconfig_path }}"
    definition:
      operation: null
      spec:
        syncPolicy:
          automated: null
  loop: "{{ retired_demo_applications }}"
  loop_control:
    loop_var: retired_demo_application
  when: >-
    retired_demo_application in
    (retired_demo_live_applications.resources | map(attribute='metadata.name') | list)
  tags: demo_cleanup

- name: Remove retired demo applications
  kubernetes.core.k8s:
    state: absent
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ retired_demo_application }}"
    namespace: argocd
    wait: true
    wait_timeout: 600
    kubeconfig: "{{ kubeconfig_path }}"
  loop: "{{ retired_demo_applications }}"
  loop_control:
    loop_var: retired_demo_application
  tags: demo_cleanup

- name: Remove retired demo namespaces and data
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Namespace
    name: "{{ retired_demo_namespace }}"
    wait: true
    wait_timeout: 600
    kubeconfig: "{{ kubeconfig_path }}"
  loop: "{{ retired_demo_namespaces }}"
  loop_control:
    loop_var: retired_demo_namespace
  tags: demo_cleanup
