#playbooks/yaml/argocd-apps/qbittorrent/deployment.yaml
<<COMMENT
Adds:
1) an init container that copies the pre‑baked config from the secret into the
   /config PVC only if the file is missing;
2) a volume mount for that secret.
Everything else is unchanged (one replica, resource limits, ports, PVCs).
COMMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      initContainers:
        - name: seed-config
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              set -e
              if [ ! -f /config/qBittorrent/qBittorrent.conf ]; then
                mkdir -p /config/qBittorrent
                cp /seed/qBittorrent.conf /config/qBittorrent/qBittorrent.conf
                echo "🔑 qBittorrent.conf seeded."
              else
                echo "ℹ️  Config already exists, skipping."
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: qbittorrent
          image: linuxserver/qbittorrent:libtorrentv1-release-5.0.5_v1.2.20-ls73
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "UTC"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
        - name: seed
          secret:
            secretName: qbittorrent-webui
            items:
              - key: qBittorrent.conf
                path: qBittorrent.conf
