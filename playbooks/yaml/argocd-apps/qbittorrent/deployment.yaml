# playbooks/yaml/argocd-apps/qbittorrent/deployment.yaml
#------------------------------------------------------------------------------
# Minimal qBittorrent Deployment (raw Kubernetes)
# * Pinned image: linuxserver/qbittorrent:libtorrentv1-release-5.0.5_v1.2.20-ls73
#   - qBittorrent 5.0.5
#   - libtorrent 1.2.20
#   - linuxserver build ls73 (multi‑arch: amd64 & arm64)
# * Volumes:
#     • /config  -> pvc: qbittorrent-config (1 Gi, Longhorn)
#     • /downloads -> pvc: qbittorrent-downloads (10 Gi, Longhorn)
# * Resource requests/limits: 100 m CPU / 256 Mi mem  → 500 m / 512 Mi
#------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      containers:
        - name: qbittorrent
          image: linuxserver/qbittorrent:libtorrentv1-release-5.0.5_v1.2.20-ls73
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "UTC"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
