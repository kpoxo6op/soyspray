#playbooks/yaml/argocd-apps/qbittorrent/deployment.yaml
# <<COMMENT
# Adds a secret‑backed init container that overwrites /config/qBittorrent/qBittorrent.conf
# on every pod start, guaranteeing the Web‑UI credentials are always what the Secret says.
# COMMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      initContainers:
        - name: seed-config
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /config/qBittorrent
              cp -f /seed/qBittorrent.conf /config/qBittorrent/qBittorrent.conf
              echo "🔑 qBittorrent.conf (re)seeded."
          volumeMounts:
            - name: config
              mountPath: /config
            - name: seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: qbittorrent
          image: linuxserver/qbittorrent:libtorrentv1-release-5.0.5_v1.2.20-ls73
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "UTC"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
        - name: seed
          secret:
            secretName: qbittorrent-webui
            items:
              - key: qBittorrent.conf
                path: qBittorrent.conf
