#playbooks/yaml/argocd-apps/qbittorrent/qbittorrent-secret.yaml
# <<COMMENT
# Correct key names for qBittorrent 5:

# * `WebUI\User`          – login name
# * `WebUI\Password_PBKDF2` – quoted @ByteArray(...) value
# COMMENT
apiVersion: v1
kind: Secret
metadata:
  name: qbittorrent-webui
  namespace: media
type: Opaque
stringData:
  qBittorrent.conf: |
    [Preferences]
    WebUI\User=admin
    WebUI\Password_PBKDF2="@ByteArray(NAxpFFYfeZ9Zz9D+DhiPXA==:AoRyN2BKlA+q3o5kj053qMCoyDCtxuJLFIVm/DF9bDYD5xXvyBRutAEb+ZA15ujxjRnN40z0FLrjkEjv28kV2A==)"
