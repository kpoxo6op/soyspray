#playbooks/yaml/argocd-apps/qbittorrent/qbittorrent-secret.yaml
# Seeds fixed Web‑UI credentials for qBittorrent.
# * user : admin
# * pass : MySuperSecret1!
# Hash generated with PBKDF2‑HMAC‑SHA512, 100 000 iterations.

apiVersion: v1
kind: Secret
metadata:
  name: qbittorrent-webui
  namespace: media
type: Opaque
stringData:
  qBittorrent.conf: |
    [Preferences]
    WebUI\User=admin
    WebUI\Password_PBKDF2="@ByteArray(NAxpFFYfeZ9Zz9D+DhiPXA==:AoRyN2BKlA+q3o5kj053qMCoyDCtxuJLFIVm/DF9bDYD5xXvyBRutAEb+ZA15ujxjRnN40z0FLrjkEjv28kV2A==)"
