#playbooks/yaml/argocd-apps/qbittorrent/qbittorrent-secret.yaml
# password 123.

# Holds the pre‑generated PBKDF2 password hash and a ready‑to‑use
# qBittorrent.conf. Mounted read‑only by an init container that copies it into
# the Longhorn PVC on the very first boot. Update the secret (rollout‑restart)
# to rotate creds.

apiVersion: v1
kind: Secret
metadata:
  name: qbittorrent-webui
  namespace: media
type: Opaque
stringData:
  qBittorrent.conf: |
    [Preferences]
    WebUI\Username=admin
    WebUI\Password_PBKDF2=sha256:5000:b9040da26fc5cfb8:32d63d47b37f03ac6d716bb3a2d932c6a5c43c8b69215444e0588928fae9eae7
