#playbooks/yaml/argocd-apps/qbittorrent/qbittorrent-secret.yaml
# <<COMMENT
# Pre‑seeds Web‑UI credentials for qBittorrent.

# * Username is fixed to **admin**.
# * Password hash was generated with PBKDF2‑HMAC‑SHA512, 100 000 iterations.
# * Mounted into the pod and copied by the init container on every start,
#   so rotating the password is just `git commit → argocd sync`.
# COMMENT
apiVersion: v1
kind: Secret
metadata:
  name: qbittorrent-webui
  namespace: media
type: Opaque
stringData:
  qBittorrent.conf: |
    [Preferences]
    WebUI\Username=admin
    WebUI\Password_PBKDF2=@ByteArray(NAxpFFYfeZ9Zz9D+DhiPXA==:AoRyN2BKlA+q3o5kj053qMCoyDCtxuJLFIVm/DF9bDYD5xXvyBRutAEb+ZA15ujxjRnN40z0FLrjkEjv28kV2A==)
