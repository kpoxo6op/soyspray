# playbooks/yaml/argocd-apps/postgresql/values.yaml
# Chart values for a single-replica PostgreSQL with moderate resources,
# a 20Gi volume on Longhorn, and basic user credentials.

global:
  postgresql:
    auth:
      username: immich
      password: immich
      database: immich

primary:
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi

resources:
  requests:
    memory: 256Mi
    cpu: 50m
  limits:
    memory: 512Mi
    cpu: 200m

volumePermissions:
  enabled: true

replica:
  replicaCount: 0
