# /home/boris/code/soyspray/playbooks/yaml/argocd-apps/postgresql/values.yaml
# This updated values file ensures PostgreSQL primary pods only run on
# nodes labeled 'longhorn=true', thus avoiding node-3 which lacks storage.

global:
  postgresql:
    auth:
      username: immich
      password: immich
      database: immich

primary:
  nodeSelector:
    longhorn: "true"
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 200m

volumePermissions:
  enabled: true

replica:
  replicaCount: 0
