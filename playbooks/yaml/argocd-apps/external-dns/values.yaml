# Configure provider and authentication
provider:
  name: cloudflare

# Configure Cloudflare API token
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

# Manage only soyspray.vip domain
domainFilters:
  - soyspray.vip

# Ensure DNS records are synced (created and deleted)
policy: sync

# Add annotations for Tailscale IP
extraArgs:
  - --txt-owner-id=k8s
  - --annotation-filter=external-dns.alpha.kubernetes.io/target
