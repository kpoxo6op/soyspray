# Configure provider and authentication
provider:
  name: cloudflare

# Configure Cloudflare API token
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

# Manage only soyspray.vip domain
domainFilters:
  - soyspray.vip

# Ensure DNS records are synced (created and deleted)
policy: sync

# Clean up old records
registry: txt
txtOwnerId: k8s
sources:
  - ingress

# Configure DNS record management
extraArgs:
  - --txt-prefix=external-dns-
  - --ignore-ingress-tls-spec
  - --ignore-ingress-rules-spec
