# Configure provider and authentication
provider:
  name: cloudflare

# Configure Cloudflare API token
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

# Manage only soyspray.vip domain
domainFilters:
  - soyspray.vip

# Ensure DNS records are synced (created and deleted)
policy: sync

# Clean up old records
registry: txt
txtOwnerId: k8s
sources:
  - ingress

# Only use annotation-specified targets, ignore ingress status
ignoreHostnameAnnotation: false
publishInternalServices: false
publishHostIP: false

extraArgs:
  - --ignore-ingress-tls-spec=false
  - --txt-prefix=external-dns-
  - --ignore-ingress-rules-spec=false
