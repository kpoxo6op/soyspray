apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: podinfo-cert
  namespace: podinfo
spec:
  secretName: podinfo-cert-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  dnsNames:
    - podinfo.test.soyspray.vip
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
