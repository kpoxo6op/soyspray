# playbooks/yaml/argocd-apps/object-storage/service.yaml
# ClusterIP Service exposing MinIO API and Console ports

apiVersion: v1
kind: Service
metadata:
  name: object-storage
  namespace: monitoring
  labels:
    app: object-storage
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: console
  selector:
    app: object-storage

