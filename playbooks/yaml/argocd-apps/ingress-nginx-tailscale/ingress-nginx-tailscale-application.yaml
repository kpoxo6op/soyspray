apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx-tailscale
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kpoxo6op/soyspray.git
    targetRevision: feature/tailscale-vpn
    path: playbooks/yaml/argocd-apps/ingress-nginx-tailscale
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
