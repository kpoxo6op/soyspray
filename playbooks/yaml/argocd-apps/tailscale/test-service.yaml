# Test deployment and service to validate Tailscale LoadBalancer functionality
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-test
  namespace: tailscale-system
spec:
  selector:
    matchLabels:
      app: tailscale-test
  replicas: 1
  template:
    metadata:
      labels:
        app: tailscale-test
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: tailscale-test
  namespace: tailscale-system
  annotations:
    external-dns.alpha.kubernetes.io/hostname: tailscale-test.soyspray.vip
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: tailscale-test
