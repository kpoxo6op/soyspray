apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-tailscale
  namespace: ingress-nginx
  annotations:
    # Force A record creation and specify target IP
    external-dns.alpha.kubernetes.io/hostname: "*.soyspray.vip"
    external-dns.alpha.kubernetes.io/ttl: "300"
    external-dns.alpha.kubernetes.io/record-type: "A"
    external-dns.alpha.kubernetes.io/target: "100.102.114.103"
    external-dns/owner-id: "default"
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443
  selector:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
