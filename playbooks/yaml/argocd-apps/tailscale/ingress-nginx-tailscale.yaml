apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-nginx-tailscale
  namespace: ingress-nginx
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "podinfo.test.soyspray.vip"
    # Using the Tailscale IP of ingress-nginx node
    external-dns.alpha.kubernetes.io/target: "100.100.115.18"
    # Force update
    external-dns.alpha.kubernetes.io/ttl: "60"
    external-dns.alpha.kubernetes.io/set-identifier: "tailscale"
spec:
  ingressClassName: nginx
  defaultBackend:
    service:
      name: ingress-nginx-controller
      port:
        number: 80
