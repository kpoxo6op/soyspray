# Tailscale subnet router - advertises cluster networks (services:
# 10.233.0.0/18, pods: 10.233.64.0/18) to VPN clients Uses OAuth for operator
# authentication and device management Enables VPN access to
# https://soyspray.vip through Tailscale

operatorConfig:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

ingressClass:
  enabled: true

proxyConfig:
  defaultTags: tag:k8s
  firewallMode: auto
