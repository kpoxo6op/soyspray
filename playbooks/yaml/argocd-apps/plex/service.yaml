# playbooks/yaml/argocd-apps/plex/service.yaml
# Switch Service to NodePort on 32400 so the eero forward lands on the node and kube-proxy delivers traffic to the Pod.
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: media
  labels:
    app: plex
spec:
  selector:
    app: plex
  ports:
    - name: http
      port: 32400
      targetPort: 32400
      protocol: TCP
  type: ClusterIP
