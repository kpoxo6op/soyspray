# playbooks/yaml/argocd-apps/plex/kustomization.yaml
# Kustomization for Plex
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: media

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pvc-config.yaml
  - pvc-media.yaml
  - initial-config-configmap.yaml

commonLabels:
  app: plex
  component: main
