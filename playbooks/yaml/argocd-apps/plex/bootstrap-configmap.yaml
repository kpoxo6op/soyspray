# playbooks/yaml/argocd-apps/plex/bootstrap-configmap.yaml
# Custom-init runs before Plex starts, writes Preferences.xml with stable IDs and offline prefs, creates the “TV Shows” library with Personal/None agent, and scans /data.
apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-custom-init
  namespace: media
  labels:
    app: plex
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  99-plex-offline-setup.sh: |-
    #!/usr/bin/with-contenv bash
    set -Eeuo pipefail

    SUPPORT_DIR="/config/Library Application Support"
    PMS_DIR="${SUPPORT_DIR}/Plex Media Server"
    PREF_FILE="${PMS_DIR}/Preferences.xml"
    TEMPLATE_FILE="/tmp/plex-config/Preferences.xml"

    echo "[custom-init] Setting up offline Plex configuration..."
    mkdir -p "${PMS_DIR}"

    NAMESPACE="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
    SEED="plex.${NAMESPACE}.svc"
    MACHINE_ID="$(printf '%s' "${SEED}" | sha1sum | awk '{print $1}')"
    PROCESSED_ID="$(printf '%s' "${MACHINE_ID}" | sha1sum | awk '{print $1}')"
    ANON_ID="$(cat /proc/sys/kernel/random/uuid)"

    tmp="$(mktemp)"
    sed "s#<Preferences#<Preferences MachineIdentifier=\"${MACHINE_ID}\" ProcessedMachineIdentifier=\"${PROCESSED_ID}\" AnonymousMachineIdentifier=\"${ANON_ID}\"#" \
      "${TEMPLATE_FILE}" > "${tmp}"
    mv -f "${tmp}" "${PREF_FILE}"

    chown -R abc:abc "${PMS_DIR}"
    chmod 600 "${PREF_FILE}"

    export LD_LIBRARY_PATH=/usr/lib/plexmediaserver
    export PLEX_MEDIA_SERVER_APPLICATION_SUPPORT_DIR="${SUPPORT_DIR}"

    echo "[custom-init] Ensuring TV Shows library exists (Personal agent)..."
    if ! "/usr/lib/plexmediaserver/Plex Media Scanner" --list | grep -Fq "TV Shows"; then
      "/usr/lib/plexmediaserver/Plex Media Scanner" --add-section "TV Shows" --type 2 --agent com.plexapp.agents.none --location "/data" --lang en
    fi

    echo "[custom-init] Scanning /data..."
    "/usr/lib/plexmediaserver/Plex Media Scanner" --scan --directory "/data" || true

    echo "[custom-init] Offline Plex setup complete - TV library ready"
