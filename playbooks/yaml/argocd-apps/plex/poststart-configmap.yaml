# playbooks/yaml/argocd-apps/plex/poststart-configmap.yaml
# Robust Plex library bootstrap using official HTTP API
# Features:
# - Uses HTTP API instead of deprecated CLI scanner commands
# - Robustly extracts TV section ID from XML responses
# - Preserves existing locations when adding /data
# - Fallback to PLEX_ACCOUNT_TOKEN when PlexOnlineToken absent
# - Re-queries sections after creation for reliable ID extraction
# - Fully idempotent and restart-safe operations
# - Modern Plex TV Series agent (tv.plex.agents.series)

apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-poststart
  namespace: media
  labels:
    app: plex
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  poststart.sh: |-
    #!/bin/bash

    echo "[postStart] Starting Plex library setup..."

    timeout=300
    counter=0
    while [ $counter -lt $timeout ]; do
        if curl -s http://127.0.0.1:32400/identity >/dev/null 2>&1; then
            echo "[postStart] Plex identity endpoint is available"
            break
        fi
        echo "[postStart] Waiting for Plex... ($counter/$timeout)"
        sleep 5
        counter=$((counter + 5))
    done

    if [ $counter -ge $timeout ]; then
        echo "[postStart] Timeout waiting for Plex to start"
        exit 1
    fi

    # Check if server is already claimed
    echo "[postStart] Checking server claim status..."
    IDENTITY_RESPONSE=$(curl -s "http://127.0.0.1:32400/identity" 2>/dev/null || echo "")
    if echo "$IDENTITY_RESPONSE" | grep -q 'claimed="1"'; then
        echo "[postStart] Server already claimed"
    else
        echo "[postStart] Server not claimed"
        if [ -n "${PLEX_ACCOUNT_TOKEN}" ]; then
            echo "[postStart] Attempting auto-claim..."
            # Get claim token
            CLAIM_RESPONSE=$(curl -s "https://plex.tv/api/claim/token?X-Plex-Token=${PLEX_ACCOUNT_TOKEN}" 2>/dev/null || echo "")
            CLAIM_TOKEN=$(echo "$CLAIM_RESPONSE" | grep -o 'token="[^"]*"' | cut -d'"' -f2 2>/dev/null || echo "")

            if [ -n "$CLAIM_TOKEN" ]; then
                echo "[postStart] Claiming server..."
                curl -s -X POST "http://127.0.0.1:32400/myplex/claim?token=${CLAIM_TOKEN}" >/dev/null 2>&1 || true

                # Wait for claim to complete
                for i in {1..15}; do
                    sleep 2
                    IDENTITY_RESPONSE=$(curl -s "http://127.0.0.1:32400/identity" 2>/dev/null || echo "")
                    if echo "$IDENTITY_RESPONSE" | grep -q 'claimed="1"'; then
                        echo "[postStart] Server claimed successfully"
                        break
                    fi
                done
            fi
        fi
    fi

    DB_FILE="/config/Library/Application Support/Plex Media Server/Plug-in Support/Databases/com.plexapp.plugins.library.db"
    counter=0
    while [ $counter -lt 60 ]; do
        if [ -f "$DB_FILE" ]; then
            echo "[postStart] Database file exists: $DB_FILE"
            break
        fi
        echo "[postStart] Waiting for database creation... ($counter/60)"
        sleep 2
        counter=$((counter + 2))
    done

    if [ ! -f "$DB_FILE" ]; then
        echo "[postStart] Warning: Database file not found, proceeding anyway"
    fi

    # Extract PlexOnlineToken from Preferences.xml, fallback to PLEX_ACCOUNT_TOKEN
    PREFS_FILE="/config/Library/Application Support/Plex Media Server/Preferences.xml"
    PLEX_TOKEN=""
    if [ -f "$PREFS_FILE" ]; then
        PLEX_TOKEN=$(grep -o 'PlexOnlineToken="[^"]*"' "$PREFS_FILE" | cut -d'"' -f2)
        if [ -n "$PLEX_TOKEN" ]; then
            echo "[postStart] Found PlexOnlineToken for API calls"
        elif [ -n "${PLEX_ACCOUNT_TOKEN}" ]; then
            echo "[postStart] Using PLEX_ACCOUNT_TOKEN as fallback"
            PLEX_TOKEN="${PLEX_ACCOUNT_TOKEN}"
        else
            echo "[postStart] WARNING: No PlexOnlineToken found in Preferences.xml and no PLEX_ACCOUNT_TOKEN"
        fi
    elif [ -n "${PLEX_ACCOUNT_TOKEN}" ]; then
        echo "[postStart] Using PLEX_ACCOUNT_TOKEN (Preferences.xml not found)"
        PLEX_TOKEN="${PLEX_ACCOUNT_TOKEN}"
    else
        echo "[postStart] WARNING: No authentication token available"
    fi

    # Function to robustly extract TV section ID from sections response
    extract_tv_section_id() {
        local response="$1"
        # Look for Directory with title="TV Shows" and extract key attribute
        echo "$response" | grep -o '<Directory[^>]*title="TV Shows"[^>]*key="[^"]*"' | sed 's/.*key="\([^"]*\)".*/\1/' | head -1
    }

    # Function to get current library locations with HTTP status check
    get_library_locations() {
        local section_id="$1"
        local token="$2"
        local response
        local http_code
        response=$(curl -s -w "%{http_code}" "http://127.0.0.1:32400/library/sections/${section_id}?X-Plex-Token=${token}" 2>/dev/null || echo "")
        http_code=$(echo "$response" | tail -c 3)
        response=$(echo "$response" | head -n -1)

        if [ "$http_code" = "200" ]; then
            echo "$response" | grep -o '<Location[^>]*path="[^"]*"' | sed 's/.*path="\([^"]*\)".*/\1/'
        else
            echo "[postStart] Failed to get library locations (HTTP $http_code)" >&2
            return 1
        fi
    }

    echo "[postStart] Checking for existing TV Shows library..."

    # Check if TV Shows library already exists via HTTP API
    TV_SECTION_ID=""
    if [ -n "$PLEX_TOKEN" ]; then
        SECTIONS_RESPONSE=$(curl -s "http://127.0.0.1:32400/library/sections?X-Plex-Token=${PLEX_TOKEN}" 2>/dev/null || echo "")
        if echo "$SECTIONS_RESPONSE" | grep -q 'title="TV Shows"'; then
            TV_SECTION_ID=$(extract_tv_section_id "$SECTIONS_RESPONSE")
            if [ -n "$TV_SECTION_ID" ]; then
                echo "[postStart] Found existing TV Shows library (ID: $TV_SECTION_ID)"
            else
                echo "[postStart] WARNING: TV Shows library found but could not extract ID"
            fi
        fi
    fi

    if [ -z "$TV_SECTION_ID" ]; then
        echo "[postStart] Creating TV Shows library..."
        # Create TV Shows library with modern Plex TV Series agent (without location parameter)
        CREATE_RESPONSE=$(curl -s -X POST "http://127.0.0.1:32400/library/sections?name=TV%20Shows&type=show&agent=tv.plex.agents.series&scanner=Plex%20TV%20Series&language=en-US&X-Plex-Token=${PLEX_TOKEN}" 2>/dev/null || echo "")

        if echo "$CREATE_RESPONSE" | grep -q 'key=".*"'; then
            # Re-query sections to get the newly created library ID
            sleep 2
            SECTIONS_RESPONSE=$(curl -s "http://127.0.0.1:32400/library/sections?X-Plex-Token=${PLEX_TOKEN}" 2>/dev/null || echo "")
            TV_SECTION_ID=$(extract_tv_section_id "$SECTIONS_RESPONSE")
            if [ -n "$TV_SECTION_ID" ]; then
                echo "[postStart] TV Shows library created successfully (ID: $TV_SECTION_ID)"

                # Now explicitly add the /data folder location using PUT request
                echo "[postStart] Adding /data folder location to TV Shows library..."
                LOCATION_UPDATE_RESPONSE=$(curl -s -X PUT "http://127.0.0.1:32400/library/sections/${TV_SECTION_ID}?agent=tv.plex.agents.series&location=/data&X-Plex-Token=${PLEX_TOKEN}" 2>/dev/null || echo "")

                if [ $? -eq 0 ] && echo "$LOCATION_UPDATE_RESPONSE" | grep -q "Directory"; then
                    echo "[postStart] /data folder location added successfully to TV Shows library"
                else
                    echo "[postStart] WARNING: Failed to add /data folder location to TV Shows library"
                    echo "[postStart] Response: $LOCATION_UPDATE_RESPONSE"
                fi
            else
                echo "[postStart] WARNING: TV Shows library creation may have succeeded but ID extraction failed"
                echo "[postStart] Response: $CREATE_RESPONSE"
            fi
        else
            echo "[postStart] WARNING: Failed to create TV Shows library"
            echo "[postStart] Response: $CREATE_RESPONSE"
        fi
    else
        echo "[postStart] Ensuring /data location is added to existing TV Shows library..."

        # Get current locations to preserve them
        CURRENT_LOCATIONS=$(get_library_locations "$TV_SECTION_ID" "$PLEX_TOKEN")
        DATA_ALREADY_EXISTS=false

        # Check if /data is already in the locations
        for location in $CURRENT_LOCATIONS; do
            if [ "$location" = "/data" ]; then
                DATA_ALREADY_EXISTS=true
                echo "[postStart] /data location already exists in TV Shows library"
                break
            fi
        done

        if [ "$DATA_ALREADY_EXISTS" = false ]; then
            # Build location parameters: preserve existing + add /data
            LOCATION_PARAMS=""
            for location in $CURRENT_LOCATIONS; do
                LOCATION_PARAMS="${LOCATION_PARAMS}&location=${location}"
            done
            LOCATION_PARAMS="${LOCATION_PARAMS}&location=/data"

            # Update library with preserved existing locations + /data
            UPDATE_RESPONSE=$(curl -s -X PUT "http://127.0.0.1:32400/library/sections/${TV_SECTION_ID}?agent=tv.plex.agents.series${LOCATION_PARAMS}&X-Plex-Token=${PLEX_TOKEN}" 2>/dev/null || echo "")

            if [ $? -eq 0 ] && echo "$UPDATE_RESPONSE" | grep -q "Directory"; then
                echo "[postStart] /data location added to TV Shows library (preserved existing locations)"
            else
                echo "[postStart] WARNING: Failed to add /data location to existing library"
                echo "[postStart] Response: $UPDATE_RESPONSE"
            fi
        fi
    fi

    # Trigger targeted scan of /data directory
    if [ -n "$TV_SECTION_ID" ] && [ -n "$PLEX_TOKEN" ]; then
        echo "[postStart] Triggering targeted scan of /data directory..."
        SCAN_RESPONSE=$(curl -s "http://127.0.0.1:32400/library/sections/${TV_SECTION_ID}/refresh?path=/data&X-Plex-Token=${PLEX_TOKEN}" 2>/dev/null || echo "")

        if [ $? -eq 0 ]; then
            echo "[postStart] Scan of /data directory initiated successfully"
        else
            echo "[postStart] WARNING: Failed to initiate scan of /data"
            echo "[postStart] Response: $SCAN_RESPONSE"
        fi
    else
        echo "[postStart] Skipping scan - missing section ID or token"
    fi

    echo "[postStart] Library setup complete"

