apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-poststart
  namespace: media
  labels:
    app: plex
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  poststart.sh: |-
    #!/bin/bash
    set -Eeuo pipefail

    echo "[postStart] Waiting for Plex to initialize..."

    # Wait for Plex identity endpoint to be available
    timeout=300
    counter=0
    while [ $counter -lt $timeout ]; do
        if curl -s http://127.0.0.1:32400/identity >/dev/null 2>&1; then
            echo "[postStart] Plex identity endpoint is available"
            break
        fi
        echo "[postStart] Waiting for Plex... ($counter/$timeout)"
        sleep 5
        counter=$((counter + 5))
    done

    if [ $counter -ge $timeout ]; then
        echo "[postStart] Timeout waiting for Plex to start"
        exit 1
    fi

    # Claim the server if we have an account token
    if [ -n "${PLEX_ACCOUNT_TOKEN}" ]; then
        # Check if already claimed first
        IDENTITY_RESPONSE=$(curl -fsS "http://127.0.0.1:32400/identity" 2>/dev/null || true)
        if echo "$IDENTITY_RESPONSE" | grep -q 'claimed="1"'; then
            echo "[postStart] Server already claimed - skipping claim process"
        else
            echo "[postStart] Server not claimed - starting claim process..."

            # Try claiming up to 3 times
            for attempt in {1..3}; do
                echo "[postStart] Claim attempt $attempt/3"

                # Request a fresh claim token using the account token (query param)
                CLAIM_RESPONSE=$(curl -fsS "https://plex.tv/api/claim/token?X-Plex-Token=${PLEX_ACCOUNT_TOKEN}" 2>/dev/null || true)

                # Extract the claim token from XML attribute
                CLAIM_TOKEN=$(echo "$CLAIM_RESPONSE" | grep -o 'token="[^"]*"' | cut -d'"' -f2)

                if [ -n "$CLAIM_TOKEN" ]; then
                    echo "[postStart] Obtained fresh claim token: ${CLAIM_TOKEN:0:10}..."

                    # Claim the server with the fresh token
                    CLAIM_RESULT=$(curl -fsS -X POST "http://127.0.0.1:32400/myplex/claim?token=${CLAIM_TOKEN}" 2>/dev/null || true)

                    # Verify claimed status by polling /identity for claimed="1" (30s total)
                    echo "[postStart] Verifying claim status..."
                    for i in {1..30}; do
                        IDENTITY_RESPONSE=$(curl -fsS "http://127.0.0.1:32400/identity" 2>/dev/null || true)
                        if echo "$IDENTITY_RESPONSE" | grep -q 'claimed="1"'; then
                            echo "[postStart] Server claimed successfully on attempt $attempt!"
                            break 2  # Break out of both loops
                        fi
                        sleep 1
                    done

                    echo "[postStart] Claim verification failed on attempt $attempt"
                else
                    echo "[postStart] Could not obtain claim token on attempt $attempt: $CLAIM_RESPONSE"
                fi

                # Wait before retrying
                if [ $attempt -lt 3 ]; then
                    echo "[postStart] Waiting before retry..."
                    sleep 3
                fi
            done

            echo "[postStart] Claim process completed"
        fi
    else
        echo "[postStart] No PLEX_ACCOUNT_TOKEN provided, skipping server claiming"
    fi

    # Wait for database file to be created
    DB_FILE="/config/Library/Application Support/Plex Media Server/Plug-in Support/Databases/com.plexapp.plugins.library.db"
    counter=0
    while [ $counter -lt 60 ]; do
        if [ -f "$DB_FILE" ]; then
            echo "[postStart] Database file exists: $DB_FILE"
            break
        fi
        echo "[postStart] Waiting for database creation... ($counter/60)"
        sleep 2
        counter=$((counter + 2))
    done

    if [ ! -f "$DB_FILE" ]; then
        echo "[postStart] Warning: Database file not found, proceeding anyway"
    fi

    export LD_LIBRARY_PATH=/usr/lib/plexmediaserver
    export PLEX_MEDIA_SERVER_APPLICATION_SUPPORT_DIR="/config/Library/Application Support"

    echo "[postStart] Creating TV Shows library if it doesn't exist..."
    if ! "/usr/lib/plexmediaserver/Plex Media Scanner" --server-token "${PLEX_ACCOUNT_TOKEN}" --list | grep -Fq "TV Shows"; then
        echo "[postStart] Creating new TV Shows library with Personal Media agent..."
        "/usr/lib/plexmediaserver/Plex Media Scanner" --server-token "${PLEX_ACCOUNT_TOKEN}" --add-section "TV Shows" --type 2 --agent com.plexapp.agents.none --location "/data" --lang en
    else
        echo "[postStart] TV Shows library already exists"
    fi

    echo "[postStart] Performing initial scan of /data..."
    "/usr/lib/plexmediaserver/Plex Media Scanner" --server-token "${PLEX_ACCOUNT_TOKEN}" --scan --directory "/data" || true

    echo "[postStart] Library setup complete"
