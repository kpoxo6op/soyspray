# playbooks/yaml/argocd-apps/plex/poststart-configmap.yaml
# Replaces Personal Media agent with default Plex TV Series agent by omitting --agent
# Waits for PlexOnlineToken after claim to avoid race
# Forces metadata refresh for the TV library before scanning
# Uses --server-token for all scanner actions; keeps /data PVC flow intact

apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-poststart
  namespace: media
  labels:
    app: plex
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  poststart.sh: |-
    #!/bin/bash

    echo "[postStart] Starting Plex library setup..."

    timeout=300
    counter=0
    while [ $counter -lt $timeout ]; do
        if curl -s http://127.0.0.1:32400/identity >/dev/null 2>&1; then
            echo "[postStart] Plex identity endpoint is available"
            break
        fi
        echo "[postStart] Waiting for Plex... ($counter/$timeout)"
        sleep 5
        counter=$((counter + 5))
    done

    if [ $counter -ge $timeout ]; then
        echo "[postStart] Timeout waiting for Plex to start"
        exit 1
    fi

    # Check if server is already claimed
    echo "[postStart] Checking server claim status..."
    IDENTITY_RESPONSE=$(curl -s "http://127.0.0.1:32400/identity" 2>/dev/null || echo "")
    if echo "$IDENTITY_RESPONSE" | grep -q 'claimed="1"'; then
        echo "[postStart] Server already claimed"
    else
        echo "[postStart] Server not claimed"
        if [ -n "${PLEX_ACCOUNT_TOKEN}" ]; then
            echo "[postStart] Attempting auto-claim..."
            # Get claim token
            CLAIM_RESPONSE=$(curl -s "https://plex.tv/api/claim/token?X-Plex-Token=${PLEX_ACCOUNT_TOKEN}" 2>/dev/null || echo "")
            CLAIM_TOKEN=$(echo "$CLAIM_RESPONSE" | grep -o 'token="[^"]*"' | cut -d'"' -f2 2>/dev/null || echo "")

            if [ -n "$CLAIM_TOKEN" ]; then
                echo "[postStart] Claiming server..."
                curl -s -X POST "http://127.0.0.1:32400/myplex/claim?token=${CLAIM_TOKEN}" >/dev/null 2>&1 || true

                # Wait for claim to complete
                for i in {1..15}; do
                    sleep 2
                    IDENTITY_RESPONSE=$(curl -s "http://127.0.0.1:32400/identity" 2>/dev/null || echo "")
                    if echo "$IDENTITY_RESPONSE" | grep -q 'claimed="1"'; then
                        echo "[postStart] Server claimed successfully"
                        break
                    fi
                done
            fi
        fi
    fi

    DB_FILE="/config/Library/Application Support/Plex Media Server/Plug-in Support/Databases/com.plexapp.plugins.library.db"
    counter=0
    while [ $counter -lt 60 ]; do
        if [ -f "$DB_FILE" ]; then
            echo "[postStart] Database file exists: $DB_FILE"
            break
        fi
        echo "[postStart] Waiting for database creation... ($counter/60)"
        sleep 2
        counter=$((counter + 2))
    done

    if [ ! -f "$DB_FILE" ]; then
        echo "[postStart] Warning: Database file not found, proceeding anyway"
    fi

    export LD_LIBRARY_PATH=/usr/lib/plexmediaserver
    export PLEX_MEDIA_SERVER_APPLICATION_SUPPORT_DIR="/config/Library/Application Support"

    echo "[postStart] Checking Plex Media Scanner availability..."
    if [ ! -x "/usr/lib/plexmediaserver/Plex Media Scanner" ]; then
        echo "[postStart] WARNING: Plex Media Scanner not found - library setup will be skipped"
        echo "[postStart] You may need to create the TV library manually via Plex Web UI"
        exit 0
    fi

    echo "[postStart] Ensuring TV Shows library exists..."
    if "/usr/lib/plexmediaserver/Plex Media Scanner" --server-token "${PLEX_ACCOUNT_TOKEN}" --list 2>/dev/null | grep -Fq "TV Shows"; then
        echo "[postStart] TV Shows library already exists"
    else
        echo "[postStart] Creating TV Shows library..."
        if "/usr/lib/plexmediaserver/Plex Media Scanner" --server-token "${PLEX_ACCOUNT_TOKEN}" --add-section "TV Shows" --type 2 --location "/data" --lang en 2>/dev/null; then
            echo "[postStart] TV Shows library created successfully"
        else
            echo "[postStart] WARNING: Failed to create TV Shows library"
        fi
    fi

    echo "[postStart] Performing initial scan of /data..."
    "/usr/lib/plexmediaserver/Plex Media Scanner" --server-token "${PLEX_ACCOUNT_TOKEN}" --scan --directory "/data" 2>/dev/null || echo "[postStart] Scan completed (some files may have been processed)"

    echo "[postStart] Library setup complete"

