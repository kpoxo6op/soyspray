# Stateless Plex: /config is emptyDir; media is read-only; initContainer runs bootstrap script
# to preseed Preferences and libraries. Service exposes TCP 32400.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: media
  labels:
    app: plex
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: bootstrap
          image: linuxserver/plex:1.41.3
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/bootstrap/bootstrap.sh"]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: bootstrap
              mountPath: /bootstrap
            - name: initial-config
              mountPath: /initial
            - name: media
              mountPath: /data
              readOnly: true
      containers:
        - name: plex
          image: linuxserver/plex:1.41.3
          imagePullPolicy: IfNotPresent
          env:
            - name: PLEX_MEDIA_SERVER_APPLICATION_SUPPORT_DIR
              value: "/config/Library/Application Support"
          ports:
            - name: http
              containerPort: 32400
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: transcode
              mountPath: /transcode
            - name: media
              mountPath: /data
              readOnly: true
          readinessProbe:
            httpGet:
              path: /identity
              port: 32400
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          emptyDir: {}
        - name: transcode
          emptyDir: {}
        - name: media
          persistentVolumeClaim:
            claimName: sonarr-tv
        - name: bootstrap
          configMap:
            name: plex-bootstrap
            defaultMode: 0755
        - name: initial-config
          configMap:
            name: plex-initial-config
      restartPolicy: Always
