# Drop-in ConfigMap that seeds a strict offline Preferences.xml. It allows only RFC1918/ULA LANs,
# disables sign-in requirement, disables DLNA & GDM, disables scheduled scans, and prevents crash reports.
apiVersion: v1
kind: ConfigMap
metadata:
  name: plex-initial-config
  namespace: media
  labels:
    app: plex
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  Preferences.xml: |-
    <?xml version="1.0" encoding="UTF-8"?>
    <Preferences
      AcceptedEULA="1"
      FirstRun="0"
      FriendlyName="Plex"
      enableLocalSecurity="0"
      allowedNetworks="192.168.1.0/255.255.255.0,10.0.0.0/255.0.0.0,172.16.0.0/255.240.0.0"
      DlnaEnabled="0"
      GdmEnabled="0"
      FSEventLibraryUpdatesEnabled="1"
      ScheduledLibraryUpdatesEnabled="0"
      ManualPortMappingMode="1"
      ManualPortMappingPort="32400"
      secureConnections="1"
      sendCrashReports="0"
      PublishServerOnPlexOnlineKey="0"
      RelayEnabled="0"
    />
