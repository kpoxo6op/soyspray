apiVersion: collectors.grafana.com/v1alpha1
kind: Alloy
metadata:
  name: alloy
  namespace: monitoring
spec:
  alloy:
    image:
      repository: grafana/alloy
      tag: v1.11.2
    args:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    configMap:
      content: |
        logging {
          level = "info"
        }

        discovery.kubernetes "pods" {
          role = "pod"

          selectors {
            role  = "pod"
            field = "spec.nodeName=" + sys.env("NODE_NAME")
          }
        }

        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            action        = "replace"
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            action        = "replace"
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            action        = "replace"
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
        }

        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pods.output
          forward_to = [loki.process.pod_logs.receiver]
        }

        loki.process "pod_logs" {
          forward_to = [loki.write.default.receiver]

          stage.cri {}

          stage.multiline {
            firstline     = "^\\d{4}-\\d{2}-\\d{2}|^[A-Z]\\d{4}|^\\[|^\\{|^time="
            max_wait_time = "3s"
          }

          stage.label_drop {
            values = ["filename"]
          }

          stage.static_labels {
            values = { job = "kubernetes-pods", cluster = "soyspray" }
          }
        }

        loki.write "default" {
          endpoint {
            tenant_id = "fake"
            url       = "http://loki.monitoring.svc.cluster.local:80/loki/api/v1/push"
          }
        }

  controller:
    type: daemonset
    podLabels:
      app.kubernetes.io/name: grafana-alloy
      app.kubernetes.io/component: agent
      app.kubernetes.io/part-of: observability
    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    env:
      - name: NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
    podSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
    volumes:
      - name: data
        type: hostPath
        hostPath: /var/lib/alloy/data
        mountPath: /var/lib/alloy/data
    ports:
      - name: http-metrics
        containerPort: 12345
        protocol: TCP
    resources:
      requests:
        cpu: 75m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  rbac:
    create: true

