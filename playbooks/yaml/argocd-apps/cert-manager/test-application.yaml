apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-ingress
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-repo/soyspray.git
    targetRevision: HEAD
    path: playbooks/yaml/argocd-apps/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
