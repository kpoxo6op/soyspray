# playbooks/yaml/argocd-apps/threadfin/initial-config-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: threadfin-initial-config
  namespace: media
  labels:
    app: threadfin
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  config.yml: |-
    web:
      username: admin
      password: "123"
    channels:
      - number: 1
        name: "Demo Channel 1"
        url: "https://example.com/stream1.m3u8"
      - number: 2
        name: "Demo Channel 2"
        url: "https://example.com/stream2.m3u8"
