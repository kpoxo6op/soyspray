apiVersion: loki.grafana.com/v1
kind: LokiStack
metadata:
  name: loki
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  managementState: Managed
  size: 1x.small
  limits:
    global:
      retention:
        days: 14
  storage:
    schemas:
      - version: v13
        effectiveDate: "2024-01-01"
    secret:
      name: loki-object-storage
      type: s3
  rules:
    enabled: true
    alertManager:
      enableV2: true
      externalUrl: http://alertmanager-operated.monitoring.svc:9093

