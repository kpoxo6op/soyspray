apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: observability
spec:
  type: ExternalName
  # Points to the operator gateway service to serve reads/writes via the same DNS name as before
  externalName: loki-gateway-http.monitoring.svc.cluster.local
  ports:
    - name: http
      port: 80

