---
# Report or remove stale cert-manager resources left behind after moving
# wildcard-covered ingresses to the shared reflected TLS secret.
#
# Default mode is report-only. To apply deletions, pass:
#   -e cert_cleanup_apply=true
#
# Optional target selection:
#   -e cert_cleanup_targets='["home-assistant","zigbee2mqtt","prometheus","obsidian"]'

- name: Common tasks for every playbook
  import_playbook: ../../../kubespray/playbooks/boilerplate.yml

- name: Report or remove stale cert-manager resources
  hosts: kube_control_plane[0]
  become: true
  gather_facts: false
  vars:
    kubeconfig_path: /etc/kubernetes/admin.conf
    cert_cleanup_apply: false
    cert_cleanup_targets:
      - home-assistant
      - zigbee2mqtt
      - prometheus
      - obsidian
    cert_cleanup_profiles:
      home-assistant:
        namespace: home-automation
        certificate_name: prod-cert-tls
        delete_secret: false
      zigbee2mqtt:
        namespace: home-automation
        certificate_name: zigbee2mqtt-tls
        delete_secret: true
      prometheus:
        namespace: monitoring
        certificate_name: prometheus-tls
        delete_secret: true
      obsidian:
        namespace: obsidian
        certificate_name: obsidian-livesync-tls
        delete_secret: true
      plex:
        namespace: media
        certificate_name: plex-tls
        delete_secret: true
      radarr:
        namespace: media
        certificate_name: radarr-tls
        delete_secret: true
      sonarr:
        namespace: media
        certificate_name: sonarr-tls
        delete_secret: true
      threadfin:
        namespace: media
        certificate_name: threadfin-tls
        delete_secret: true

  tasks:
    - name: Validate cleanup target names
      ansible.builtin.assert:
        that:
          - cert_cleanup_targets | length > 0
          - (cert_cleanup_targets | difference(cert_cleanup_profiles.keys() | list)) | length == 0
        fail_msg: >-
          Unknown cert_cleanup_targets value. Valid targets:
          {{ cert_cleanup_profiles.keys() | list | join(', ') }}

    - name: Build selected cleanup profiles
      ansible.builtin.set_fact:
        selected_cleanup_profiles: >-
          {{
            cert_cleanup_profiles
            | dict2items
            | selectattr('key', 'in', cert_cleanup_targets)
            | map(attribute='value')
            | list
          }}

    - name: Fetch Certificates
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: cert-manager.io/v1
        kind: Certificate
      register: cert_info

    - name: Fetch CertificateRequests
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: cert-manager.io/v1
        kind: CertificateRequest
      register: cert_request_info

    - name: Fetch Orders
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: acme.cert-manager.io/v1
        kind: Order
      register: order_info

    - name: Fetch Challenges
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: acme.cert-manager.io/v1
        kind: Challenge
      register: challenge_info

    - name: Fetch Secrets
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: v1
        kind: Secret
      register: secret_info

    - name: Build stale resource plan
      ansible.builtin.set_fact:
        cert_cleanup_plan: "{{ (cert_cleanup_plan | default([])) + [plan_item] }}"
      vars:
        plan_item:
          namespace: "{{ item.namespace }}"
          certificate_name: "{{ item.certificate_name }}"
          delete_secret: "{{ item.delete_secret }}"
          certificates: >-
            {{
              cert_info.resources
              | selectattr('metadata.namespace', 'equalto', item.namespace)
              | selectattr('metadata.name', 'equalto', item.certificate_name)
              | list
            }}
          certificate_requests: >-
            {{
              cert_request_info.resources
              | selectattr('metadata.namespace', 'equalto', item.namespace)
              | selectattr('metadata.name', 'match', '^' ~ item.certificate_name ~ '(-|$)')
              | list
            }}
          orders: >-
            {{
              order_info.resources
              | selectattr('metadata.namespace', 'equalto', item.namespace)
              | selectattr('metadata.name', 'match', '^' ~ item.certificate_name ~ '(-|$)')
              | list
            }}
          challenges: >-
            {{
              challenge_info.resources
              | selectattr('metadata.namespace', 'equalto', item.namespace)
              | selectattr('metadata.name', 'match', '^' ~ item.certificate_name ~ '(-|$)')
              | list
            }}
          secrets: >-
            {{
              (
                secret_info.resources
                | selectattr('metadata.namespace', 'equalto', item.namespace)
                | selectattr('metadata.name', 'equalto', item.certificate_name)
                | list
              ) if item.delete_secret else []
            }}
      loop: "{{ selected_cleanup_profiles }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.certificate_name }}"

    - name: Show cleanup plan
      ansible.builtin.debug:
        msg:
          target: "{{ item.namespace }}/{{ item.certificate_name }}"
          delete_secret: "{{ item.delete_secret }}"
          certificates: "{{ item.certificates | map(attribute='metadata.name') | list }}"
          certificate_requests: "{{ item.certificate_requests | map(attribute='metadata.name') | list }}"
          orders: "{{ item.orders | map(attribute='metadata.name') | list }}"
          challenges: "{{ item.challenges | map(attribute='metadata.name') | list }}"
          secrets: "{{ item.secrets | map(attribute='metadata.name') | list }}"
      loop: "{{ cert_cleanup_plan }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.certificate_name }}"

    - name: Stop after report-only mode
      ansible.builtin.meta: end_play
      when: not (cert_cleanup_apply | bool)

    - name: Delete stale Certificate resources
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: absent
        api_version: cert-manager.io/v1
        kind: Certificate
        namespace: "{{ item.0.namespace }}"
        name: "{{ item.1.metadata.name }}"
      loop: "{{ cert_cleanup_plan | subelements('certificates', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.namespace }}/{{ item.1.metadata.name }}"

    - name: Delete stale CertificateRequest resources
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: absent
        api_version: cert-manager.io/v1
        kind: CertificateRequest
        namespace: "{{ item.0.namespace }}"
        name: "{{ item.1.metadata.name }}"
      loop: "{{ cert_cleanup_plan | subelements('certificate_requests', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.namespace }}/{{ item.1.metadata.name }}"

    - name: Delete stale Order resources
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: absent
        api_version: acme.cert-manager.io/v1
        kind: Order
        namespace: "{{ item.0.namespace }}"
        name: "{{ item.1.metadata.name }}"
      loop: "{{ cert_cleanup_plan | subelements('orders', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.namespace }}/{{ item.1.metadata.name }}"

    - name: Delete stale Challenge resources
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: absent
        api_version: acme.cert-manager.io/v1
        kind: Challenge
        namespace: "{{ item.0.namespace }}"
        name: "{{ item.1.metadata.name }}"
      loop: "{{ cert_cleanup_plan | subelements('challenges', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.namespace }}/{{ item.1.metadata.name }}"

    - name: Delete stale TLS Secret resources
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: absent
        api_version: v1
        kind: Secret
        namespace: "{{ item.0.namespace }}"
        name: "{{ item.1.metadata.name }}"
      loop: "{{ cert_cleanup_plan | subelements('secrets', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.namespace }}/{{ item.1.metadata.name }}"
