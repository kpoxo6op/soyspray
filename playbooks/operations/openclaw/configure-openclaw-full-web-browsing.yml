---
# Playbook to enable full browser tooling for OpenClaw

- name: Common tasks for every playbook
  import_playbook: ../../../kubespray/playbooks/boilerplate.yml

- name: Enable OpenClaw full web browsing
  hosts: kube_control_plane[0]
  become: true
  vars:
    openclaw_user: openclaw
    openclaw_home: "/home/{{ openclaw_user }}"
    openclaw_config_file: "{{ openclaw_home }}/.openclaw/openclaw.json"
    openclaw_service_name: openclaw-gateway
    openclaw_service_unit_file: "/etc/systemd/system/{{ openclaw_service_name }}.service"
    openclaw_browser_executable_candidates:
      - /usr/bin/google-chrome-stable
      - /usr/bin/google-chrome
      - /usr/bin/chromium
      - /usr/bin/chromium-browser
      - /snap/bin/chromium
    openclaw_browser_block:
      enabled: true
      defaultProfile: chrome
      headless: true
      executablePath: "{{ openclaw_browser_executable_path }}"
      attachOnly: false
      noSandbox: true
    openclaw_browser_agent_id: "main"
    openclaw_browser_tool_name: "browser"
    openclaw_system_packages:
      - chromium
      - chromium-browser
      - chromium-driver
    openclaw_node_packages:
      - playwright
    openclaw_node_prerequisite_packages:
      - nodejs
      - npm
    openclaw_playwright_browsers_path: "{{ openclaw_home }}/.cache/ms-playwright"
    openclaw_playwright_root_cache_path: /root/.cache/ms-playwright
    openclaw_google_chrome_deb: /tmp/google-chrome-stable_current_amd64.deb
    openclaw_google_chrome_url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
    openclaw_npm_binary_fallbacks:
      - /usr/bin/npm
      - /usr/local/bin/npm
      - /bin/npm
      - /usr/local/sbin/npm
    openclaw_npm_home: "{{ openclaw_home }}"
    openclaw_npm_prefix: /usr/local
    openclaw_npm_environment:
      HOME: "{{ openclaw_npm_home }}"
      NPM_CONFIG_PREFIX: "{{ openclaw_npm_prefix }}"
      PLAYWRIGHT_BROWSERS_PATH: "{{ openclaw_playwright_browsers_path }}"
  pre_tasks:
    - name: Check whether openclaw user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ openclaw_user }}"
        fail_key: false
      register: openclaw_passwd

    - name: Set user existence fact
      ansible.builtin.set_fact:
        openclaw_user_exists: >-
          {{
            openclaw_passwd.ansible_facts.getent_passwd is defined and
            openclaw_user in openclaw_passwd.ansible_facts.getent_passwd
          }}

    - name: Fail when openclaw user is missing
      ansible.builtin.fail:
        msg: "openclaw user does not exist. Run install-openclaw-host.yml first."
      when: not openclaw_user_exists

    - name: Check whether OpenClaw config exists
      ansible.builtin.stat:
        path: "{{ openclaw_config_file }}"
      register: openclaw_config_stat

    - name: Fail when OpenClaw config is missing
      ansible.builtin.fail:
        msg: "OpenClaw config not found at {{ openclaw_config_file }}. Run configure-openclaw-installation-mode.yml first."
      when: not openclaw_config_stat.stat.exists
  tasks:
    - name: Install browser package candidates for headless browsing
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
        update_cache: true
      loop: "{{ openclaw_system_packages }}"
      register: openclaw_browser_package_install
      ignore_errors: true
      failed_when: false

    - name: Check whether any browser package installed
      ansible.builtin.set_fact:
        openclaw_browser_package_installed: >-
          {{ openclaw_browser_package_install.results | map(attribute='failed') | select('equalto', false) | list | length > 0 }}

    - name: Resolve npm executable
      ansible.builtin.shell: |
        if command -v npm >/dev/null 2>&1; then
          command -v npm
          exit 0
        fi

        for candidate in "{{ openclaw_npm_binary_fallbacks | join(' ') }}"; do
          if [ -x "$candidate" ]; then
            echo "$candidate"
            exit 0
          fi
        done
        exit 1
      register: openclaw_npm_binary_lookup
      changed_when: false
      failed_when: false

    - name: Ensure Node.js and npm are installed
      ansible.builtin.apt:
        name: "{{ openclaw_node_prerequisite_packages }}"
        state: present
        update_cache: true
      when: openclaw_npm_binary_lookup.rc != 0

    - name: Set npm executable path
      ansible.builtin.set_fact:
        openclaw_npm_binary: "{{ openclaw_npm_binary_lookup.stdout | trim }}"

    - name: Resolve npm executable after install attempt
      ansible.builtin.shell: |
        if command -v npm >/dev/null 2>&1; then
          command -v npm
          exit 0
        fi

        for candidate in "{{ openclaw_npm_binary_fallbacks | join(' ') }}"; do
          if [ -x "$candidate" ]; then
            echo "$candidate"
            exit 0
          fi
        done
        exit 1
      register: openclaw_npm_binary_lookup_retry
      changed_when: false
      failed_when: openclaw_npm_binary_lookup_retry.rc != 0

    - name: Set npm executable path after install attempt
      ansible.builtin.set_fact:
        openclaw_npm_binary: "{{ openclaw_npm_binary_lookup_retry.stdout | trim }}"

    - name: Check whether full Playwright package is installed
      ansible.builtin.command: "{{ openclaw_npm_binary }} list -g --depth=0 playwright"
      register: openclaw_playwright_package
      changed_when: false
      failed_when: false
      environment: "{{ openclaw_npm_environment }}"

    - name: Install full Playwright package
      ansible.builtin.command: "{{ openclaw_npm_binary }} install -g {{ openclaw_node_packages | join(' ') }}"
      register: openclaw_playwright_install
      changed_when: openclaw_playwright_install.rc == 0
      when: openclaw_playwright_package.rc != 0
      environment: "{{ openclaw_npm_environment }}"

    - name: Install Playwright Chromium browser binaries
      ansible.builtin.command: "{{ openclaw_npm_binary }} exec playwright install chromium"
      register: openclaw_playwright_browsers
      changed_when: openclaw_playwright_browsers.rc == 0
      environment: "{{ openclaw_npm_environment }}"

    - name: Mirror root Playwright cache for openclaw user access
      ansible.builtin.shell: |
        if [ -d "{{ openclaw_playwright_root_cache_path }}" ]; then
          mkdir -p "{{ openclaw_playwright_browsers_path }}"
          cp -a "{{ openclaw_playwright_root_cache_path }}/." "{{ openclaw_playwright_browsers_path }}/"
          chown -R "{{ openclaw_user }}:{{ openclaw_user }}" "{{ openclaw_playwright_browsers_path }}"
        fi
      changed_when: true

    - name: Find Playwright Chromium executable
      ansible.builtin.find:
        paths: "{{ openclaw_playwright_browsers_path }}"
        patterns: "chrome"
        recurse: true
        file_type: file
      register: openclaw_playwright_browser_lookup

    - name: Add Playwright executable candidates
      ansible.builtin.set_fact:
        openclaw_browser_executable_candidates: >-
          {{
            openclaw_browser_executable_candidates + (
              openclaw_playwright_browser_lookup.files
              | map(attribute='path')
              | select('search', '/chrome-linux/chrome$')
              | list
              | sort
            )
          }}

    - name: Resolve browser executable path
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ openclaw_browser_executable_candidates }}"
      register: openclaw_browser_executable_checks

    - name: Set browser executable path
      ansible.builtin.set_fact:
        openclaw_browser_executable_path: >-
          {{
            (
              openclaw_browser_executable_checks.results
              | selectattr('stat.exists', 'equalto', true)
              | reject('search', '/snap/')
              | reject('search', '/usr/bin/chromium-browser$')
              | map(attribute='item')
              | list
              | first
            ) | default(
              (
                openclaw_browser_executable_checks.results
                | selectattr('stat.exists', 'equalto', true)
                | map(attribute='item')
                | list
                | first
              )
            ) | default('')
          }}

    - name: Install Google Chrome fallback when snap/legacy path is selected
      ansible.builtin.get_url:
        url: "{{ openclaw_google_chrome_url }}"
        dest: "{{ openclaw_google_chrome_deb }}"
        mode: "0644"
      when:
        - openclaw_browser_executable_path in ['/usr/bin/chromium-browser', '/snap/bin/chromium']

    - name: Install Google Chrome fallback package
      ansible.builtin.apt:
        deb: "{{ openclaw_google_chrome_deb }}"
        state: present
      when:
        - openclaw_browser_executable_path in ['/usr/bin/chromium-browser', '/snap/bin/chromium']

    - name: Re-resolve browser executable path after Chrome fallback install
      ansible.builtin.set_fact:
        openclaw_browser_executable_path: /usr/bin/google-chrome-stable
      when:
        - openclaw_browser_executable_path in ['/usr/bin/chromium-browser', '/snap/bin/chromium']
        - ansible_facts['distribution'] is defined

    - name: Build browser block with resolved executable path
      ansible.builtin.set_fact:
        openclaw_browser_block_resolved: "{{ openclaw_browser_block | combine({'executablePath': openclaw_browser_executable_path}, recursive=True) }}"

    - name: Verify browser executable exists
      ansible.builtin.fail:
        msg: >-
          No browser executable found in {{ openclaw_browser_executable_candidates | join(', ') }}.
          Install chromium before enabling full web browsing.
      when: openclaw_browser_executable_path | length == 0

    - name: Read current OpenClaw config
      ansible.builtin.slurp:
        path: "{{ openclaw_config_file }}"
      register: openclaw_config_raw

    - name: Parse OpenClaw config
      ansible.builtin.set_fact:
        openclaw_config_json: "{{ openclaw_config_raw.content | b64decode | from_json }}"

    - name: Enable browser tool and keep conservative non-browser deny settings
      ansible.builtin.set_fact:
        openclaw_tools: "{{ (openclaw_config_json.tools | default({})) | combine({
          'deny': ((openclaw_config_json.tools.deny | default([]))
            | reject('equalto', 'browser')
            | list)
        }, recursive=True) }}"

    - name: Merge browser settings and tool policy
      ansible.builtin.set_fact:
        openclaw_config_json_updated: "{{ openclaw_config_json | combine({
          'tools': openclaw_tools,
          'browser': ((openclaw_config_json.browser | default({})) | combine(openclaw_browser_block_resolved, recursive=True))
        }, recursive=True) }}"

    - name: Persist OpenClaw config
      ansible.builtin.copy:
        dest: "{{ openclaw_config_file }}"
        owner: "{{ openclaw_user }}"
        group: "{{ openclaw_user }}"
        mode: "0600"
        content: "{{ openclaw_config_json_updated | to_nice_json }}"

    - name: Ensure main agent has browser in tool allowlist
      ansible.builtin.shell: |
        python3 - <<'PY'
        import json

        config_path = '{{ openclaw_config_file }}'
        agent_id = '{{ openclaw_browser_agent_id }}'
        tool_name = '{{ openclaw_browser_tool_name }}'

        with open(config_path, 'r', encoding='utf-8') as f:
            cfg = json.load(f)

        agents_block = cfg.get('agents') or {}
        agents = agents_block.get('list')
        if not isinstance(agents, list):
            agents = []

        updated = False
        for agent in agents:
            if not isinstance(agent, dict) or agent.get('id') != agent_id:
                continue
            tools = agent.setdefault('tools', {})
            allow = tools.get('allow')
            if not isinstance(allow, list):
                allow = []
            if tool_name not in allow:
                allow.append(tool_name)
            tools['allow'] = sorted(dict.fromkeys(allow))
            agent['tools'] = tools
            updated = True
            break

        if not updated:
            agents.append({'id': agent_id, 'tools': {'allow': [tool_name]}})

        agents_block['list'] = agents
        cfg['agents'] = agents_block

        with open(config_path, 'w', encoding='utf-8') as f:
            json.dump(cfg, f, indent=2)
            f.write('\n')
        PY
      changed_when: true

    - name: Restart gateway (systemd service path)
      ansible.builtin.stat:
        path: "{{ openclaw_service_unit_file }}"
      register: openclaw_systemd_unit

    - name: Restart OpenClaw gateway (systemd)
      ansible.builtin.systemd:
        daemon_reload: true
        name: "{{ openclaw_service_name }}.service"
        state: restarted
      when: openclaw_systemd_unit.stat.exists
      failed_when: false

    - name: Restart OpenClaw gateway (user service fallback)
      ansible.builtin.command: "runuser -l {{ openclaw_user }} -c 'systemctl --user restart {{ openclaw_service_name }}'"
      register: openclaw_gateway_restart_fallback
      changed_when: openclaw_gateway_restart_fallback.rc == 0
      failed_when: false
      when: not openclaw_systemd_unit.stat.exists

    - name: Show runbook summary
      ansible.builtin.debug:
        msg:
          - "System browser package installed: {{ openclaw_browser_package_installed }}"
          - "Playwright package install rc: {{ openclaw_playwright_install.rc | default('skipped') }}"
          - "Playwright browsers install rc: {{ openclaw_playwright_browsers.rc | default('not run') }}"
          - "Enabled browser tooling and host browser path in {{ openclaw_config_file }}"
          - "Main agent browser allowlist entry ensured for {{ openclaw_browser_agent_id }}"
