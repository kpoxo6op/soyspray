# playbooks/manage-argocd-apps.yml
---
- name: Apply Argo CD Applications - Deploy Application Manifests
  hosts: kube_control_plane[0]
  become: true
  vars:
    kubeconfig_path: /etc/kubernetes/admin.conf
    # Roles own their internal task tags (e.g. `prometheus-crds`). This playbook
    # always includes all roles so `--tags <tag>` works as expected.
    argocd_app_roles:
      # Observability
      - { name: Prometheus, role: apps/prometheus }
      - { name: Alloy Loki Manual, role: apps/alloy-loki-manual }
      - { name: Alert Test, role: apps/alert-test }

      # Infrastructure
      - { name: Longhorn, role: apps/longhorn }
      - { name: Cert Manager, role: apps/cert-manager }
      - { name: External DNS, role: apps/external-dns }
      - { name: Headlamp, role: apps/headlamp }
      - { name: Jenkins, role: apps/jenkins }

      # Database
      - { name: CNPG Operator, role: apps/cnpg-operator }
      - { name: CNPG Immich Alias ApplicationSet, role: apps/cnpg-immich-alias }
      - { name: CNPG Immich Database ApplicationSet, role: apps/cnpg-immich-db }
      - { name: Immich Database Active, role: apps/immich-db-active }
      - { name: Immich Database A, role: apps/immich-db-a }
      - { name: Immich Database B, role: apps/immich-db-b }
      - { name: Immich Database B Restore, role: apps/immich-db-b-restore }
      - { name: Redis, role: apps/redis }
      - { name: Obsidian, role: apps/obsidian }

      # Media
      - { name: Plex, role: apps/plex }
      - { name: Jellyfin, role: apps/jellyfin }
      - { name: Prowlarr, role: apps/prowlarr }
      - { name: qBittorrent, role: apps/qbittorrent }
      - { name: LazyLibrarian, role: apps/lazylibrarian }
      - { name: Booklore, role: apps/booklore }
      - { name: Sonarr, role: apps/sonarr }
      - { name: Threadfin, role: apps/threadfin }
      - { name: Streamlink, role: apps/streamlink }
      - { name: Immich, role: apps/immich }

      # Home Automation
      - { name: Mosquitto, role: apps/mosquitto }
      - { name: Zigbee2MQTT, role: apps/zigbee2mqtt }
      - { name: Home Assistant, role: apps/homeassistant }
  tasks:
    - name: "Include {{ item.name }}"
      ansible.builtin.include_role:
        name: "{{ item.role }}"
      tags: always
      loop: "{{ argocd_app_roles }}"
      loop_control:
        label: "{{ item.role }}"
