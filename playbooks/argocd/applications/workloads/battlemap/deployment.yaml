apiVersion: apps/v1
kind: Deployment
metadata:
  name: battlemap
  namespace: battlemap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: battlemap
  template:
    metadata:
      labels:
        app: battlemap
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: web
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: web
          configMap:
            name: battlemap-web
