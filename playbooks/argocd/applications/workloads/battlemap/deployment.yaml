apiVersion: apps/v1
kind: Deployment
metadata:
  name: battlemap
  namespace: battlemap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: battlemap
  template:
    metadata:
      labels:
        app: battlemap
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 96Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: web
              mountPath: /usr/share/nginx/html
              readOnly: true
        - name: jira-api
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/api.py
          env:
            - name: JIRA_BASE_URL
              value: http://jira.jira.svc.cluster.local:8080
            - name: JIRA_PROJECT_KEY
              value: SPICE
            - name: JIRA_BOARD_NAME
              value: SPICE Kafka Platform Board
            - name: JIRA_USERNAME
              value: demo
            - name: JIRA_PASSWORD
              value: demo-password
            - name: MAPFLOW_SEED_PATH
              value: /app/data.json
          ports:
            - containerPort: 8080
              name: api
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: web
              mountPath: /app
              readOnly: true
      volumes:
        - name: web
          configMap:
            name: battlemap-web
