apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: battlemap
  namespace: battlemap
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - battlemap.soyspray.vip
      secretName: prod-cert-tls
  rules:
    - host: battlemap.soyspray.vip
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: battlemap
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: battlemap
                port:
                  number: 80
