apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jira

resources:
  - namespace.yaml
  - secret.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - jira-pvc.yaml
  - jira-deployment.yaml
  - jira-service.yaml
  - jira-ingress.yaml
  - bootstrap-rbac.yaml
  - bootstrap-configmap.yaml
  - bootstrap-job.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: jira-demo
