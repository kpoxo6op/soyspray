apiVersion: v1
kind: ServiceAccount
metadata:
  name: jira-bootstrap
  namespace: jira
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jira-bootstrap
  namespace: jira
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jira-bootstrap
  namespace: jira
subjects:
  - kind: ServiceAccount
    name: jira-bootstrap
    namespace: jira
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jira-bootstrap
