apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-hardware
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: node-hardware
      rules:
        - alert: SmartctlExporterDown
          expr: |
            absent(up{namespace="monitoring", pod=~"smartctl-exporter-.*"} == 1)
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "SMART exporter is not being scraped"
            description: "Prometheus has not scraped any smartctl-exporter pod in namespace=monitoring for 15 minutes."
        - alert: SmartDeviceUnhealthy
          expr: |
            smartctl_device_smart_status == 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "SMART status failed for {{ $labels.device }}"
            description: "smartctl reports a failed SMART status for device {{ $labels.device }}."
        - alert: SmartPendingSectorsDetected
          expr: |
            smartctl_device_attribute{attribute_name="Current_Pending_Sector", attribute_value_type="raw"} > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Pending sectors detected on {{ $labels.device }}"
            description: "SMART reports {{ $value }} pending sectors on device {{ $labels.device }}."
        - alert: SmartDeviceTemperatureHigh
          expr: |
            smartctl_device_temperature{temperature_type="current"} >= 65
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Disk temperature high on {{ $labels.device }}"
            description: "SMART temperature is {{ $value }}C on device {{ $labels.device }}."
