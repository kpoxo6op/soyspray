apiVersion: v1
kind: ServiceAccount
metadata:
  name: smartctl-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: smartctl-exporter
    app.kubernetes.io/part-of: kube-prometheus-stack
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: smartctl-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: smartctl-exporter
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: smartctl-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smartctl-exporter
        app.kubernetes.io/part-of: kube-prometheus-stack
    spec:
      serviceAccountName: smartctl-exporter
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: smartctl-exporter
          image: quay.io/prometheuscommunity/smartctl-exporter:v0.14.0
          imagePullPolicy: IfNotPresent
          args:
            - --web.listen-address=:9633
            - --smartctl.interval=5m
            - --smartctl.rescan=30m
            - --smartctl.device=/dev/disk/by-id/nvme-eui.00080d02005b0230
            - --smartctl.device=/dev/disk/by-id/ata-Samsung_SSD_870_EVO_500GB_S5Y4NFOR5613453
            - --smartctl.device=/dev/disk/by-id/wwn-0x5000000000000001;scsi
          ports:
            - name: metrics
              containerPort: 9633
          securityContext:
            privileged: true
            runAsUser: 0
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: run-udev
              mountPath: /run/udev
              readOnly: true
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: run-udev
          hostPath:
            path: /run/udev
            type: DirectoryOrCreate
