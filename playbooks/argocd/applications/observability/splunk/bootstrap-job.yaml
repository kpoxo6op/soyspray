apiVersion: batch/v1
kind: Job
metadata:
  name: splunk-bootstrap
  namespace: splunk
  labels:
    app: splunk
    component: bootstrap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: splunk
        component: bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: python:3.12-slim
          command:
            - python
            - /workspace/bootstrap.py
          env:
            - name: SPLUNK_BASE_URL
              value: https://splunk.splunk.svc.cluster.local:8089
            - name: SPLUNK_ADMIN_USERNAME
              value: admin
            - name: SPLUNK_ADMIN_PASSWORD
              value: AdminPassword123!
            - name: SPLUNK_SERVICE_ACCOUNT_USERNAME
              value: svc_dashboards
            - name: SPLUNK_SERVICE_ACCOUNT_PASSWORD
              value: ServiceDashboards123!
            - name: SPLUNK_SERVICE_ACCOUNT_ROLES
              value: power
            - name: SPLUNK_APP_NAME
              value: soyspray_dashboards
            - name: SPLUNK_APP_LABEL
              value: Soyspray Dashboards
            - name: SPLUNK_APP_DESCRIPTION
              value: Sample app managed by the soyspray Splunk REST pipeline.
            - name: SPLUNK_DASHBOARD_DIR
              value: /workspace/dashboards
            - name: SPLUNK_TIMEOUT_SECONDS
              value: "30"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: pipeline
              mountPath: /workspace
              readOnly: true
            - name: dashboards
              mountPath: /workspace/dashboards
              readOnly: true
      volumes:
        - name: pipeline
          configMap:
            name: splunk-rest-pipeline
            defaultMode: 0755
        - name: dashboards
          configMap:
            name: splunk-rest-dashboards
            defaultMode: 0644
