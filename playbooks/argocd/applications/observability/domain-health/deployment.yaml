apiVersion: apps/v1
kind: Deployment
metadata:
  name: domain-health
  namespace: domain-health
  labels:
    app.kubernetes.io/name: domain-health
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: domain-health
  template:
    metadata:
      labels:
        app.kubernetes.io/name: domain-health
    spec:
      containers:
        - name: exporter
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /app/domain-health-exporter.py
          ports:
            - name: metrics
              containerPort: 8080
          env:
            - name: DOMAIN_NAME
              value: soyspray.vip
            - name: CHECK_INTERVAL_SECONDS
              value: "21600"
            - name: HTTP_PORT
              value: "8080"
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: api-token
            - name: HEALTHCHECKS_PING_URL
              valueFrom:
                secretKeyRef:
                  name: domain-health-config
                  key: healthchecks-ping-url
            - name: EXPECTED_NAMESERVERS
              valueFrom:
                secretKeyRef:
                  name: domain-health-config
                  key: expected-nameservers
          volumeMounts:
            - name: exporter-script
              mountPath: /app
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 60
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: exporter-script
          configMap:
            name: domain-health-exporter
            defaultMode: 0555
