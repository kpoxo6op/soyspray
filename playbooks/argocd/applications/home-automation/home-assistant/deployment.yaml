# playbooks/argocd/applications/home-automation/home-assistant/deployment.yaml
# Deployment for Home Assistant
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-automation
  labels:
    app: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
        component: main
    spec:
      initContainers:
        - name: bootstrap-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              test -f /config/configuration.yaml || cp /bootstrap/configuration.yaml /config/configuration.yaml
              test -f /config/automations.yaml || cp /bootstrap/automations.yaml /config/automations.yaml
              test -f /config/scripts.yaml || cp /bootstrap/scripts.yaml /config/scripts.yaml
              test -f /config/scenes.yaml || cp /bootstrap/scenes.yaml /config/scenes.yaml
          volumeMounts:
            - name: config
              mountPath: /config
            - name: bootstrap
              mountPath: /bootstrap
        - name: install-dreame-vacuum
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -euo pipefail
              apk add --no-cache ca-certificates unzip wget >/dev/null
              version="v2.0.0b23"
              expected_sha256="7cd8e3af9d90c3a4b018970b9a05faa48c4c43d40cb007b0e7b031e174db068e"
              install_dir="/config/custom_components/dreame_vacuum"
              version_file="${install_dir}/.soyspray-version"

              if [ -f "${version_file}" ] && [ "$(cat "${version_file}")" = "${version}" ]; then
                exit 0
              fi

              tmp_dir="$(mktemp -d)"
              wget -q -O "${tmp_dir}/dreame_vacuum.zip" "https://github.com/Tasshack/dreame-vacuum/releases/download/${version}/dreame_vacuum.zip"
              echo "${expected_sha256}  ${tmp_dir}/dreame_vacuum.zip" | sha256sum -c -
              rm -rf "${install_dir}"
              mkdir -p "${install_dir}"
              unzip -q "${tmp_dir}/dreame_vacuum.zip" -d "${install_dir}"
              echo "${version}" > "${version_file}"
              rm -rf "${tmp_dir}"
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:2025.7.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8123
              name: http
          env:
            - name: TZ
              value: "Pacific/Auckland"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config
        - name: bootstrap
          configMap:
            name: home-assistant-bootstrap
