apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: acme-renewal-smoke
  namespace: cert-manager
spec:
  duration: 24h
  renewBefore: 12h
  secretName: acme-renewal-smoke-tls
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  dnsNames:
    - "acme-renewal-smoke.soyspray.vip"
