apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - kong-gateway-podmonitor.yaml
  - kong-prometheus-plugin.yaml
  - kong-prometheus-scrape-networkpolicy.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: grafana-dashboard-kong-bank-lab-operator-overview
    namespace: monitoring
    files:
      - dashboards/kong-bank-lab-operator-overview.json
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: kong-bank-lab
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
