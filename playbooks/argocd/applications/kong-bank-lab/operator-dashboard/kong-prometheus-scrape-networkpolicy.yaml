apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-allow-prometheus-status-scrape
  namespace: platform-kong
  labels:
    app.kubernetes.io/part-of: kong-bank-lab
spec:
  podSelector:
    matchLabels:
      banklab.konghq.com/component: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
              prometheus: kube-prometheus-stack-prometheus
      ports:
        - protocol: TCP
          port: 8100
