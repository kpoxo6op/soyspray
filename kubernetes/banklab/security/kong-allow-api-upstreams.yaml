apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-allow-api-upstreams
  namespace: platform-kong
  labels:
    app.kubernetes.io/part-of: kong-bank-lab
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: security
spec:
  podSelector:
    matchLabels:
      banklab.konghq.com/component: gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: platform.soyspray.io/tenant
                operator: Exists
          podSelector:
            matchLabels:
              banklab.konghq.com/platform-layer: synthetic-api
      ports:
        - protocol: TCP
          port: 8080
