# HTTPRoute objects stay with the synthetic-bank API app to avoid Argo ownership overlap.
apiVersion: v1
kind: Namespace
metadata:
  name: synthetic-clients
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-client-security
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.35
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banklab-rate-limit-redis
  namespace: platform-kong
  labels: &id001
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api-security
    app.kubernetes.io/name: banklab-rate-limit-redis
    banklab.konghq.com/component: rate-limit-redis
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: banklab-rate-limit-redis
  template:
    metadata:
      labels: *id001
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: redis
        image: redis:7.4.2-alpine@sha256:02419de7eddf55aa5bcf49efb74e88fa8d931b4d77c07eff8a6b2144472b6952
        args:
        - redis-server
        - --save
        - ''
        - --appendonly
        - 'no'
        ports:
        - name: redis
          containerPort: 6379
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 15
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: redis-tmp
          mountPath: /data
      volumes:
      - name: redis-tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: banklab-rate-limit-redis
  namespace: platform-kong
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api-security
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: banklab-rate-limit-redis
  ports:
  - name: redis
    port: 6379
    targetPort: redis
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: banklab-rate-limit-redis-ingress
  namespace: platform-kong
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api-security
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: banklab-rate-limit-redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          banklab.konghq.com/component: gateway
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-allow-rate-limit-redis
  namespace: platform-kong
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api-security
spec:
  podSelector:
    matchLabels:
      banklab.konghq.com/component: gateway
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: banklab-rate-limit-redis
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-allow-node-local-dns
  namespace: platform-kong
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api-security
spec:
  podSelector:
    matchLabels:
      banklab.konghq.com/component: gateway
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 169.254.25.10/32
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-allow-controller-webhook-from-api-server
  namespace: platform-kong
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api-security
spec:
  podSelector:
    matchLabels:
      banklab.konghq.com/component: kic
  policyTypes:
  - Ingress
  ingress:
  - from:
    - ipBlock:
        cidr: 192.168.20.10/32
    - ipBlock:
        cidr: 192.168.20.11/32
    - ipBlock:
        cidr: 192.168.20.12/32
    ports:
    - protocol: TCP
      port: 8080
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: banklab-key-auth
  namespace: tenant-accounts
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api-security
    banklab.konghq.com/api-domain: accounts
plugin: key-auth
config:
  key_names:
  - apikey
  key_in_header: true
  key_in_query: false
  key_in_body: false
  hide_credentials: true
  run_on_preflight: false
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: banklab-acl
  namespace: tenant-accounts
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api-security
    banklab.konghq.com/api-domain: accounts
plugin: acl
config:
  allow:
  - banklab-accounts
  hide_groups_header: true
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: banklab-rate-limit
  namespace: tenant-accounts
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api-security
    banklab.konghq.com/api-domain: accounts
plugin: rate-limiting
config:
  policy: redis
  limit_by: consumer
  second: 3
  fault_tolerant: false
  hide_client_headers: false
  redis:
    host: banklab-rate-limit-redis.platform-kong.svc.cluster.local
    port: 6379
    database: 0
    timeout: 2000
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: banklab-correlation-id
  namespace: tenant-accounts
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api-security
    banklab.konghq.com/api-domain: accounts
