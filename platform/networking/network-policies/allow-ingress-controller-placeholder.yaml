apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller-placeholder
  namespace: tenant-accounts
  labels:
    banklab.konghq.com/platform-layer: prereq
    banklab.konghq.com/owner: tenant-accounts-team
  annotations:
    banklab.konghq.com/placeholder: "future-ingress-controller"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-networking

