apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observability-scrape-placeholder
  namespace: tenant-accounts
  labels:
    banklab.konghq.com/platform-layer: prereq
    banklab.konghq.com/owner: tenant-accounts-team
  annotations:
    banklab.konghq.com/placeholder: "future-observability-scrape"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-observability

