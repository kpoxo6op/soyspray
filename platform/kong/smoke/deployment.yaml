apiVersion: apps/v1
kind: Deployment
metadata:
  name: banklab-kong-smoke
  namespace: platform-kong-smoke
  labels:
    app.kubernetes.io/name: banklab-kong-smoke
    banklab.konghq.com/platform-layer: gateway
    banklab.konghq.com/not-business-api: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: banklab-kong-smoke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: banklab-kong-smoke
        banklab.konghq.com/platform-layer: gateway
        banklab.konghq.com/not-business-api: "true"
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:8080
            - -text=banklab-kong-smoke-ok
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
