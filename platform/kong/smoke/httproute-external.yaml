apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kong-smoke-external
  namespace: platform-kong-smoke
  labels:
    banklab.konghq.com/platform-layer: gateway
    banklab.konghq.com/not-business-api: "true"
spec:
  parentRefs:
    - name: kong-external
      namespace: platform-kong
      sectionName: http
  hostnames:
    - kong-smoke.external.banklab.test
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: banklab-kong-smoke
          port: 80
