apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kong-allow-kube-api-placeholder
  namespace: platform-kong
  labels:
    banklab.konghq.com/platform-layer: gateway
    banklab.konghq.com/owner: platform-team
  annotations:
    banklab.konghq.com/verified-for-cluster: "kubernetes service 10.233.0.1:443 with endpoints 192.168.20.10-12:6443"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: app
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.233.0.1/32
      ports:
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: 192.168.20.10/32
        - ipBlock:
            cidr: 192.168.20.11/32
        - ipBlock:
            cidr: 192.168.20.12/32
      ports:
        - protocol: TCP
          port: 6443
