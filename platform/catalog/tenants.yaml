      - internal
      - external
    allowed_plugins:
      - key-auth
      - jwt
      - acl
      - rate-limiting
      - correlation-id
      - response-transformer
    data_classifications_allowed:
      - internal
      - confidential
      - restricted
    support_contact: payments-platform-support@example.invalid
    reviewers:
      - payments-platform-reviewer
      - kong-platform
    break_glass_contact: kong-platform-oncall@example.invalid
    change_approval_group: payments-change-approvers
  - tenant_id: risk-compliance
