      - internal
      - confidential
      - restricted
    support_contact: risk-platform-support@example.invalid
    reviewers:
      - risk-platform-reviewer
      - kong-platform
    break_glass_contact: kong-platform-oncall@example.invalid
    change_approval_group: risk-change-approvers
