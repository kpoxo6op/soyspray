tenants:
  - tenant_id: retail-accounts
    display_name: Retail Accounts
    logical_workspace: retail-banking
    namespace: tenant-accounts
    api_namespaces:
      - tenant-accounts
      - tenant-cards
      - tenant-customer-profile
    owned_api_ids:
      - accounts
      - cards
      - customer-profile
    allowed_exposure:
      - internal
    allowed_plugins:
      - key-auth
      - acl
      - rate-limiting
      - correlation-id
      - response-transformer
    data_classifications_allowed:
      - internal
      - confidential
    support_contact: retail-platform-support@example.invalid
    reviewers:
      - retail-platform-reviewer
      - kong-platform
    break_glass_contact: kong-platform-oncall@example.invalid
    change_approval_group: retail-change-approvers
  - tenant_id: payments
    display_name: Payments
