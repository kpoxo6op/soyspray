apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banklab-cert-manager-prereqs
  namespace: argocd
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: prereq
    banklab.konghq.com/owner: platform-security-team
  annotations:
    banklab.konghq.com/template: "true"
    banklab.konghq.com/repo-url-note: "Replace REPLACE_WITH_REPO_URL before applying."
spec:
  project: security-prereqs
  source:
    repoURL: REPLACE_WITH_REPO_URL
    targetRevision: HEAD
    path: platform/certificates/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    syncOptions:
      - CreateNamespace=false

