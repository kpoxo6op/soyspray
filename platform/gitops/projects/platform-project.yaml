apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-prereqs
  namespace: argocd
  labels:
    banklab.konghq.com/platform-layer: prereq
    banklab.konghq.com/owner: platform-team
spec:
  description: Platform prerequisite resources for the Kong OSS bank lab.
  sourceRepos:
    - REPLACE_WITH_REPO_URL
  destinations:
    - namespace: platform-*
      server: https://kubernetes.default.svc
    - namespace: metallb-system
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: metallb.io
      kind: IPAddressPool
    - group: metallb.io
      kind: L2Advertisement

