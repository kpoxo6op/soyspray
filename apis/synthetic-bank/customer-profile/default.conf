server {
  listen 8080;
  location = /healthz { default_type text/plain; return 200 'banklab-probe-ok\n'; }
  location = /customers/v1/health { default_type text/plain; return 200 'banklab-customer-profile-ok\n'; }
  location /customers/v1 { default_type application/json; return 200 '{"api":"customer-profile","marker":"banklab-customer-profile-ok","synthetic":true}'; }
}
