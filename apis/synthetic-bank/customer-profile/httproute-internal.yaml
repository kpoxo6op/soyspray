apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: banklab-customer-profile
  namespace: tenant-customer-profile
  annotations:
    konghq.com/plugins: banklab-key-auth,banklab-acl,banklab-rate-limit,banklab-correlation-id
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api
    banklab.konghq.com/authorization-profile: acl-api-groups
    banklab.konghq.com/rate-limit-profile: internal-redis-3rps
    banklab.konghq.com/api-domain: customer-profile
    banklab.konghq.com/owner: tenant-customer-profile-team
    banklab.konghq.com/exposure: internal
spec:
  parentRefs:
  - name: kong-internal
    namespace: platform-kong
    sectionName: http
  hostnames:
  - api.internal.banklab.test
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /customers/v1
    backendRefs:
    - name: banklab-customer-profile-api
      port: 80
