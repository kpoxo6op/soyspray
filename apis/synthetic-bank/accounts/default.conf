server {
  listen 8080;
  location = /healthz { default_type text/plain; return 200 'banklab-probe-ok\n'; }
  location = /accounts/v1/health { default_type text/plain; return 200 'banklab-accounts-ok\n'; }
  location /accounts/v1 { default_type application/json; return 200 '{"api":"accounts","marker":"banklab-accounts-ok","synthetic":true}'; }
}
