server {
  listen 8080;
  location = /healthz { default_type text/plain; return 200 'banklab-probe-ok\n'; }
  location = /fraud/v1/health { default_type text/plain; return 200 'banklab-fraud-decisions-ok\n'; }
  location /fraud/v1 { default_type application/json; return 200 '{"api":"fraud-decisions","marker":"banklab-fraud-decisions-ok","synthetic":true}'; }
}
