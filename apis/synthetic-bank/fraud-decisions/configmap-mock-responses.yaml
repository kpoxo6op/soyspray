apiVersion: v1
kind: ConfigMap
metadata:
  name: banklab-fraud-decisions-mock-responses
  namespace: tenant-fraud
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api
    banklab.konghq.com/environment: lab
    banklab.konghq.com/data-classification: synthetic
    banklab.konghq.com/lifecycle: sandbox
    banklab.konghq.com/auth-profile: none-temporary-goal003-sandbox
    banklab.konghq.com/auth-state: temporary-no-auth
    banklab.konghq.com/goal: goal-003
    banklab.konghq.com/api-domain: fraud-decisions
    banklab.konghq.com/owner: tenant-fraud-team
    banklab.konghq.com/exposure: internal
data:
  default.conf: "server {\n  listen 8080;\n  location = /fraud/v1/health { default_type\
    \ text/plain; return 200 'banklab-fraud-decisions-ok\\n'; }\n  location /fraud/v1\
    \ { default_type application/json; return 200 '{\"api\":\"fraud-decisions\",\"\
    marker\":\"banklab-fraud-decisions-ok\",\"synthetic\":true}'; }\n}\n"
