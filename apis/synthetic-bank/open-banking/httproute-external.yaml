apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: banklab-open-banking
  namespace: tenant-open-banking
  annotations:
    konghq.com/plugins: banklab-jwt,banklab-acl,banklab-rate-limit,banklab-correlation-id
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api
    banklab.konghq.com/authorization-profile: acl-api-groups
    banklab.konghq.com/rate-limit-profile: external-redis-3rps
    banklab.konghq.com/api-domain: open-banking
    banklab.konghq.com/owner: tenant-open-banking-team
    banklab.konghq.com/exposure: external
spec:
  parentRefs:
  - name: kong-external
    namespace: platform-kong
    sectionName: http
  hostnames:
  - api.external.banklab.test
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /open-banking/v1
    backendRefs:
    - name: banklab-open-banking-api
      port: 80
