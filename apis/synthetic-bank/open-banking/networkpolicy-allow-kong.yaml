apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kong-to-synthetic-api
  namespace: tenant-open-banking
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api
    banklab.konghq.com/environment: lab
    banklab.konghq.com/data-classification: synthetic
    banklab.konghq.com/lifecycle: sandbox
    banklab.konghq.com/auth-profile: none-temporary-goal003-sandbox
    banklab.konghq.com/auth-state: temporary-no-auth
    banklab.konghq.com/goal: goal-003
    banklab.konghq.com/api-domain: open-banking
    banklab.konghq.com/owner: tenant-open-banking-team
    banklab.konghq.com/exposure: external
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: banklab-open-banking-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: platform-kong
      podSelector:
        matchLabels:
          banklab.konghq.com/component: gateway
    ports:
    - protocol: TCP
      port: 8080
