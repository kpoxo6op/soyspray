server {
  listen 8080;
  location = /healthz { default_type text/plain; return 200 'banklab-probe-ok\n'; }
  location = /open-banking/v1/health { default_type text/plain; return 200 'banklab-open-banking-ok\n'; }
  location /open-banking/v1 { default_type application/json; return 200 '{"api":"open-banking","marker":"banklab-open-banking-ok","synthetic":true}'; }
}
