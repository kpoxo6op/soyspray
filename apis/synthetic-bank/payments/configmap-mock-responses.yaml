apiVersion: v1
kind: ConfigMap
metadata:
  name: banklab-payments-mock-responses
  namespace: tenant-payments
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api
    banklab.konghq.com/environment: lab
    banklab.konghq.com/data-classification: synthetic
    banklab.konghq.com/lifecycle: sandbox
    banklab.konghq.com/auth-profile: none-temporary-goal003-sandbox
    banklab.konghq.com/auth-state: temporary-no-auth
    banklab.konghq.com/goal: goal-003
    banklab.konghq.com/api-domain: payments
    banklab.konghq.com/owner: tenant-payments-team
    banklab.konghq.com/exposure: internal
data:
  default.conf: "server {\n  listen 8080;\n  location = /payments/v1/health { default_type\
    \ text/plain; return 200 'banklab-payments-ok\\n'; }\n  location /payments/v1\
    \ { default_type application/json; return 200 '{\"api\":\"payments\",\"marker\"\
    :\"banklab-payments-ok\",\"synthetic\":true}'; }\n}\n"
