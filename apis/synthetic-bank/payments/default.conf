server {
  listen 8080;
  location = /healthz { default_type text/plain; return 200 'banklab-probe-ok\n'; }
  location = /payments/v1/health { default_type text/plain; return 200 'banklab-payments-ok\n'; }
  location /payments/v1 { default_type application/json; return 200 '{"api":"payments","marker":"banklab-payments-ok","synthetic":true}'; }
}
