server {
  listen 8080;
  location = /healthz { default_type text/plain; return 200 'banklab-probe-ok\n'; }
  location = /cards/v1/health { default_type text/plain; return 200 'banklab-cards-ok\n'; }
  location = /cards/v1/simulate-500 { default_type application/json; return 500 '{"error":"synthetic-backend-error","marker":"banklab-cards-500","synthetic":true}'; }
  location = /cards/v1/cards { default_type application/json; return 200 '{"customer":"Alex Morgan","cards":[{"name":"Everyday Visa","last4":"4242","status":"Active","available":1850.75,"currency":"NZD"},{"name":"Travel Card","last4":"9931","status":"Locked","available":540.00,"currency":"NZD"}],"marker":"banklab-cards-ok","synthetic":true}'; }
  location /cards/v1 { default_type application/json; return 200 '{"api":"cards","marker":"banklab-cards-ok","synthetic":true}'; }
}
