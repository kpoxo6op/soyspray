apiVersion: v1
kind: Service
metadata:
  name: banklab-cards-api
  namespace: tenant-cards
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api
    banklab.konghq.com/api-domain: cards
    banklab.konghq.com/owner: tenant-cards-team
    banklab.konghq.com/exposure: internal
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: banklab-cards-api
  ports:
  - name: http
    port: 80
    targetPort: 8080
