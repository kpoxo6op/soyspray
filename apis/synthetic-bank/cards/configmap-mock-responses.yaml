apiVersion: v1
kind: ConfigMap
metadata:
  name: banklab-cards-mock-responses
  namespace: tenant-cards
  labels:
    banklab.konghq.com/managed-by: gitops
    banklab.konghq.com/platform-layer: synthetic-api
    banklab.konghq.com/environment: lab
    banklab.konghq.com/data-classification: synthetic
    banklab.konghq.com/lifecycle: sandbox
    banklab.konghq.com/auth-profile: none-temporary-goal003-sandbox
    banklab.konghq.com/auth-state: temporary-no-auth
    banklab.konghq.com/goal: goal-003
    banklab.konghq.com/api-domain: cards
    banklab.konghq.com/owner: tenant-cards-team
    banklab.konghq.com/exposure: internal
data:
  default.conf: "server {\n  listen 8080;\n  location = /cards/v1/health { default_type\
    \ text/plain; return 200 'banklab-cards-ok\\n'; }\n  location /cards/v1 { default_type\
    \ application/json; return 200 '{\"api\":\"cards\",\"marker\":\"banklab-cards-ok\"\
    ,\"synthetic\":true}'; }\n}\n"
