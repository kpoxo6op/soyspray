apiVersion: v1
kind: Service
metadata:
  name: ingress-nginx-tailscale
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
    app.kubernetes.io/instance: tailscale-operator
  annotations:
    # External DNS configuration
    external-dns.alpha.kubernetes.io/hostname: nginx.ts.soyspray.vip
    external-dns.alpha.kubernetes.io/ttl: "300"
    external-dns.alpha.kubernetes.io/record-type: "A"
    external-dns.alpha.kubernetes.io/target: "100.102.114.103"
    external-dns/owner-id: "default"
    # Tailscale configuration
    tailscale.com/hostname-publish: "false"
    tailscale.com/funnel: "true"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  externalTrafficPolicy: Local
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443
  selector:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: ingress-nginx
